name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  release:
    if: github.ref == 'refs/heads/master'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        id: bump
        run: |
          uv run cz bump --yes && echo "bumped=true" >> "$GITHUB_OUTPUT" || {
            code=$?; [ $code -eq 16 ] && echo "bumped=false" >> "$GITHUB_OUTPUT" || exit $code
          }

      - name: Set up Node.js
        if: steps.bump.outputs.bumped == 'true'
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        if: steps.bump.outputs.bumped == 'true'
        run: npm install -g @github/copilot

      - name: Summarize changelog and create release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          CHANGELOG=$(awk '/^## /{i++} i==1{print} i==2{exit}' CHANGELOG.md)
          SUMMARY=$(copilot -sp "Summarize the following changelog for a GitHub release in 3-5 plain bullet points, no markdown headers:\n\n${CHANGELOG}" --no-ask-user)
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "$SUMMARY" \
            --latest
