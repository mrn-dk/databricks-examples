[tool.uv]
package = false

[tool.uv.workspace]
members = ["examples/*"]

[dependency-groups]
dev = [
    "commitizen>=4.16.3",
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "semver2"
version_provider = "scm"
update_changelog_on_bump = true
major_version_zero = true
bump_message = "bump: version $current_version → $new_version [skip ci]"